name: Test Setup Script

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: 'src/tmux/plugins' # Ignore third-party scripts

  test-setup:
    needs: lint
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up test environment
        run: |
          echo "Setting up test environment..."
          # Clean up any existing configs to simulate fresh install
          rm -rf ~/.config/bat ~/.config/fastfetch ~/.config/ghostty ~/.config/tmux ~/.config/zsh
          rm -f ~/.zshrc ~/.zprofile
          # Create a mock home directory structure for the script
          mkdir -p ~/.dots
          cp -R . ~/.dots/

      - name: Make setup script executable
        run: chmod +x setup.sh

      - name: Run setup script
        run: ./setup.sh
        env:
          CI: true

      - name: Verify Homebrew installation
        run: |
          if command -v brew &> /dev/null; then
            echo "✅ Homebrew is installed"
            brew --version
          else
            echo "❌ Homebrew installation failed"
            exit 1
          fi

      - name: Verify symlinks
        run: |
          echo "Checking symlinks..."
          all_good=true

          # Check .config symlinks
          for dir in bat fastfetch ghostty tmux zsh; do
            if [ -L ~/.config/$dir ]; then
              target=$(readlink ~/.config/$dir)
              echo "✅ ~/.config/$dir -> $target"
              if [ ! -e "$target" ]; then
                echo "❌ Broken symlink: ~/.config/$dir"
                all_good=false
              fi
            else
              echo "❌ Missing symlink: ~/.config/$dir"
              all_good=false
            fi
          done

          # Check home directory symlinks
          if [ -L ~/.zshrc ]; then
            target=$(readlink ~/.zshrc)
            echo "✅ ~/.zshrc -> $target"
            if [ ! -e "$target" ]; then
                echo "❌ Broken symlink: ~/.zshrc"
                all_good=false
            fi
          else
            echo "❌ Missing symlink: ~/.zshrc"
            all_good=false
          fi

          if [ "$all_good" = false ]; then
            exit 1
          fi

      - name: Test Brewfile packages (Dry Run)
        run: |
          if [ -f "./assets/Brewfile" ]; then
            echo "Checking Brewfile..."
            brew bundle check --file=./assets/Brewfile || echo "Some bundles would be installed"
          else
            echo "⚠️ No Brewfile found to verify"
          fi

  test-unsupported-macos:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mock macOS 10.15 environment
        run: |
          # Create a mock sw_vers and uname for the test
          mkdir -p bin
          echo -e '#!/bin/bash\necho "10.15.7"' > bin/sw_vers
          echo -e '#!/bin/bash\nif [ "$1" == "-s" ]; then echo "Darwin"; else /usr/bin/uname "$@"; fi' > bin/uname
          chmod +x bin/sw_vers bin/uname
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Run setup script (dry run)
        run: |
          export CI=true
          # The script should warn but continue because CI is set
          ./setup.sh | grep -q "Warning: You are running macOS 10.15.7"
          echo "✅ Successfully detected and warned about old macOS version"
