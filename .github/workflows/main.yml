name: Test Setup Script

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck (Bash scripts only)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: 'src/tmux/plugins src/zsh' # Ignore non-bash files
          additional_files: 'tests/test_setup.sh'

      - name: Zsh Syntax Check
        run: |
          # Install zsh if not present (usually is on ubuntu)
          sudo apt-get update && sudo apt-get install -y zsh
          
          echo "Checking Zsh syntax..."
          # Find all zsh files and run syntax check (zsh -n)
          find src/zsh -type f \( -name "*.zsh" -o -name ".zshrc" -o -name ".*" \) -not -path "*/.*" -exec zsh -n {} +
          echo "✅ Zsh syntax check passed"

  test-setup:
    needs: lint
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x setup.sh
          chmod +x tests/test_setup.sh

      - name: Run automated test suite
        run: |
          cd tests
          ./test_setup.sh
        env:
          CI: true

      - name: Verify installation with setup.sh
        run: |
          # Use the script's own verification logic to ensure it's still working
          # in a real environment after the test suite.
          export CI=true
          ./setup.sh

  test-unsupported-macos:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mock macOS 10.15 environment
        run: |
          # Create a mock sw_vers and uname for the test
          mkdir -p bin
          echo -e '#!/bin/bash\necho "10.15.7"' > bin/sw_vers
          echo -e '#!/bin/bash\nif [ "$1" == "-s" ]; then echo "Darwin"; else /usr/bin/uname "$@"; fi' > bin/uname
          chmod +x bin/sw_vers bin/uname
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Run setup script (dry run)
        run: |
          export CI=true
          # The script should warn but continue because CI is set
          ./setup.sh | grep -q "Warning: You are running macOS 10.15.7"
          echo "✅ Successfully detected and warned about old macOS version"
