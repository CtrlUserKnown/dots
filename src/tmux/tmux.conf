# CrtlUserKnown tmux config
# Date: 2025-12-27

# --- Escape key responsiveness ---
set -sg escape-time 0

# --- allow reloading of config ---
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# --- mouse ---
set -g mouse on
set -as terminal-features ',*:hyperlinks'

# --- prefix key ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- base index ---
set -g base-index 1
setw -g pane-base-index 1

# --- window management ---
unbind %
unbind '"'
unbind /
bind / split-window -h
bind - split-window -v
bind-key x kill-pane
bind-key & kill-window

# --- popup management ---
bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind -n M-Escape display-popup -C

set -g cursor-style blinking-block

# --- pane/window navigation ---
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# --- hide pane ---
bind-key h resize-pane -Z

set -as terminal-features ',*:hyperlinks'

if-shell 'tmux list-keys -T copy-mode-vi >/dev/null 2>&1' \
    "unbind -T copy-mode-vi h; unbind -T copy-mode-vi j; unbind -T copy-mode-vi k; unbind -T copy-mode-vi l; unbind -T copy-mode-vi v; unbind -T copy-mode-vi Enter" ""

bind u run-shell -b "tmux capture-pane -J -p | grep -oE '(https?):\\/\\/[^ ]+' | fzf-tmux -d20 --multi --bind alt-a:select-all,alt-d:deselect-all | xargs open"

# --- plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'alexwforsythe/tmux-which-key'

# --- tmux-resurrect settings ---
set -g @resurrect-dir '~/.config/tmux/resurrect'

# --- tmux-continuum settings ---
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# --- Rose Pine theme settings ---
set -g @rose_pine_variant 'main'
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_bar_bg_disable 'on'

# Initialize TPM (keep at bottom)
if-shell "test -f ~/.config/tmux/plugins/tpm/tpm" \
    "run '~/.config/tmux/plugins/tpm/tpm'" \
    "run '~/.tmux/plugins/tpm/tpm'"

if-shell "test -f ~/.config/tmux/plugins/rose-pine/rose-pine.tmux" \
    "run-shell ~/.config/tmux/plugins/rose-pine/rose-pine.tmux" \
    ""

# --- status bar ---
set -g status-position bottom
set -g status-interval 2

set -g status-left-length 50
set -g status-right-length 100

set -g status-bg '#191724'
set -g status-fg '#e0def4'

set -g status-left "#[fg=#c4a7e7,bold,bg=#191724] ❐ #S #[fg=#9ccfd8]| #[fg=#f6c177]#(tmux list-windows | wc -l | tr -d ' ') windows #[fg=#9ccfd8]| "

set -g status-right "#[fg=#9ccfd8]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/^/ /') #[fg=#eb6f92]| #[fg=#f6c177]#{b:pane_current_path} #[fg=#eb6f92]| #[fg=#c4a7e7]%H:%M "

set -g window-status-format "#[fg=#6e6a86] #I:#W "
set -g window-status-current-format "#[fg=#eb6f92,bold] #I:#W "
set -g window-status-separator ""
